name: Build and deploy Python project to Azure Function App - scb-scraping
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' 
  # Keeping 3.11 is the right choice for stability
  PYTHON_VERSION: '3.11'
 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
 
      - name: Install dependencies (Flex Consumption Mode)
        run: |
          python -m pip install --upgrade pip
          # --- CRITICAL FIX START ---
          # We force 'manylinux2014_x86_64' to ensure C-libraries like lxml 
          # are compatible with the Azure Linux environment, not just the GitHub runner.
          pip install --target=".python_packages/lib/site-packages" \
              --platform manylinux2014_x86_64 \
              --implementation cp \
              --python-version 3.11 \
              --only-binary=:all: \
              --upgrade \
              -r requirements.txt
          # --- CRITICAL FIX END ---
 
      - name: Zip artifact for deployment
        run: |
          # Explicitly include the hidden .python_packages folder
          # We use -r to recurse and -x to exclude git/github junk
          zip -r release.zip . -x "venv/*" ".git/*" ".github/*" "__pycache__/*"
 
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
 
  deploy:
    runs-on: ubuntu-latest
    needs: build
 
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
 
      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip
 
      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'scb-scraping'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D6E09E4B59C145C7B38C95E8F45D09AA }}
          sku: 'flexconsumption'
